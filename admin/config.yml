backend:
  name: git-gateway
  branch: main

media_folder: "assets/img"
public_folder: "/assets/img"

locale: 'id'

collections:

  # ── HALAMAN UTAMA ──────────────────────────────────────────
  - name: "halaman-utama"
    label: "🏠 Halaman Utama"
    files:
      - name: "beranda"
        label: "Beranda (Mata Pelajaran & Kartu)"
        file: "konten/index.json"
        fields:
          - name: "judul_website"
            label: "Judul Website"
            widget: "string"
          - name: "mapel"
            label: "Mata Pelajaran"
            widget: "list"
            summary: "{{fields.judul}}"
            fields:
              - name: "judul"
                label: "Judul Mata Pelajaran"
                widget: "string"
              - name: "kartu"
                label: "Kartu-kartu"
                widget: "list"
                summary: "{{fields.nama}}"
                fields:
                  - name: "nama"
                    label: "Nama Kartu"
                    widget: "string"
                  - name: "link"
                    label: "Link Halaman"
                    widget: "string"

  # ── MATERI ──────────────────────────────────────────────────
  - name: "materi"
    label: "📚 Materi"
    files:

      - name: "tauhid"
        label: "Tauhid"
        file: "konten/tauhid.json"
        fields:
          - name: "judul"
            label: "Judul Halaman"
            widget: "string"
          - name: "kelompok"
            label: "Kelompok"
            widget: "list"
            summary: "{{fields.nama}}"
            fields:
              - name: "id"
                label: "ID (huruf kecil, tanpa spasi)"
                widget: "string"
              - name: "nama"
                label: "Nama Kelompok"
                widget: "string"
              - name: "konten"
                label: "Konten"
                widget: "markdown"

      - name: "bidah"
        label: "Bid'ah"
        file: "konten/bidah.json"
        fields:
          - name: "judul"
            label: "Judul Halaman"
            widget: "string"
          - name: "kelompok"
            label: "Kelompok"
            widget: "list"
            summary: "{{fields.nama}}"
            fields:
              - name: "id"
                label: "ID (huruf kecil, tanpa spasi)"
                widget: "string"
              - name: "nama"
                label: "Nama Kelompok"
                widget: "string"
              - name: "konten"
                label: "Konten"
                widget: "markdown"

      - name: "sifat"
        label: "Sifat Allah"
        file: "konten/sifat.json"
        fields:
          - name: "judul"
            label: "Judul Halaman"
            widget: "string"
          - name: "kelompok"
            label: "Kelompok"
            widget: "list"
            summary: "{{fields.nama}}"
            fields:
              - name: "id"
                label: "ID (huruf kecil, tanpa spasi)"
                widget: "string"
              - name: "nama"
                label: "Nama Kelompok"
                widget: "string"
              - name: "konten"
                label: "Konten"
                widget: "markdown"

      - name: "iman"
        label: "Iman"
        file: "konten/iman.json"
        fields:
          - name: "judul"
            label: "Judul Halaman"
            widget: "string"
          - name: "kelompok"
            label: "Kelompok"
            widget: "list"
            summary: "{{fields.nama}}"
            fields:
              - name: "id"
                label: "ID (huruf kecil, tanpa spasi)"
                widget: "string"
              - name: "nama"
                label: "Nama Kelompok"
                widget: "string"
              - name: "konten"
                label: "Konten"
                widget: "markdown"

      - name: "abu-syuja"
        label: "Matan Abu Syuja'"
        file: "konten/abu-syuja.json"
        fields:
          - {name: "judul", label: "Judul Halaman", widget: "string"}
          - name: "kelompok"
            label: "Kelompok"
            widget: "list"
            summary: "{{fields.nama}}"
            fields:
              - {name: "id", label: "ID", widget: "string"}
              - {name: "nama", label: "Nama Kelompok", widget: "string"}
              - {name: "konten", label: "Konten", widget: "markdown"}

      - name: "umdatul-ahkam"
        label: "Umdatul Ahkam"
        file: "konten/umdatul-ahkam.json"
        fields:
          - {name: "judul", label: "Judul Halaman", widget: "string"}
          - name: "kelompok"
            label: "Kelompok"
            widget: "list"
            summary: "{{fields.nama}}"
            fields:
              - {name: "id", label: "ID", widget: "string"}
              - {name: "nama", label: "Nama Kelompok", widget: "string"}
              - {name: "konten", label: "Konten", widget: "markdown"}

      - name: "jurumiyah"
        label: "Matan Jurumiyah"
        file: "konten/jurumiyah.json"
        fields:
          - {name: "judul", label: "Judul Halaman", widget: "string"}
          - name: "kelompok"
            label: "Kelompok"
            widget: "list"
            summary: "{{fields.nama}}"
            fields:
              - {name: "id", label: "ID", widget: "string"}
              - {name: "nama", label: "Nama Kelompok", widget: "string"}
              - {name: "konten", label: "Konten", widget: "markdown"}

      - name: "mutammimah"
        label: "Mutammimah"
        file: "konten/mutammimah.json"
        fields:
          - {name: "judul", label: "Judul Halaman", widget: "string"}
          - name: "kelompok"
            label: "Kelompok"
            widget: "list"
            summary: "{{fields.nama}}"
            fields:
              - {name: "id", label: "ID", widget: "string"}
              - {name: "nama", label: "Nama Kelompok", widget: "string"}
              - {name: "konten", label: "Konten", widget: "markdown"}

      - name: "tashrif"
        label: "Kaedah-kaedah Tashrif"
        file: "konten/tashrif.json"
        fields:
          - {name: "judul", label: "Judul Halaman", widget: "string"}
          - name: "kelompok"
            label: "Kelompok"
            widget: "list"
            summary: "{{fields.nama}}"
            fields:
              - {name: "id", label: "ID", widget: "string"}
              - {name: "nama", label: "Nama Kelompok", widget: "string"}
              - {name: "konten", label: "Konten", widget: "markdown"}

      - name: "wazan"
        label: "Wazan-wazan Shorf"
        file: "konten/wazan.json"
        fields:
          - {name: "judul", label: "Judul Halaman", widget: "string"}
          - name: "kelompok"
            label: "Kelompok"
            widget: "list"
            summary: "{{fields.nama}}"
            fields:
              - {name: "id", label: "ID", widget: "string"}
              - {name: "nama", label: "Nama Kelompok", widget: "string"}
              - {name: "konten", label: "Konten", widget: "markdown"}

      - name: "siroh-nabawi"
        label: "Siroh Nabawi"
        file: "konten/siroh-nabawi.json"
        fields:
          - {name: "judul", label: "Judul Halaman", widget: "string"}
          - name: "kelompok"
            label: "Kelompok"
            widget: "list"
            summary: "{{fields.nama}}"
            fields:
              - {name: "id", label: "ID", widget: "string"}
              - {name: "nama", label: "Nama Kelompok", widget: "string"}
              - {name: "konten", label: "Konten", widget: "markdown"}

      - name: "siroh-sahabat"
        label: "Siroh Sahabat"
        file: "konten/siroh-sahabat.json"
        fields:
          - {name: "judul", label: "Judul Halaman", widget: "string"}
          - name: "kelompok"
            label: "Kelompok"
            widget: "list"
            summary: "{{fields.nama}}"
            fields:
              - {name: "id", label: "ID", widget: "string"}
              - {name: "nama", label: "Nama Kelompok", widget: "string"}
              - {name: "konten", label: "Konten", widget: "markdown"}

  - name: "coming-soon"
    label: "Coming Soon"
    files:
      - name: "coming-soon"
        label: "Halaman Coming Soon"
        file: "konten/coming-soon.json"
        fields:
          - {name: "judul", label: "Judul", widget: "string"}
          - {name: "deskripsi", label: "Deskripsi", widget: "text"}
          - name: "berita"
            label: "Daftar Berita"
            widget: "list"
            summary: "{{fields.judul}}"
            fields:
              - {name: "id", label: "ID (huruf kecil, tanpa spasi)", widget: "string"}
              - {name: "judul", label: "Judul Berita", widget: "string"}
              - {name: "deskripsi", label: "Deskripsi", widget: "text"}
              - name: "status"
                label: "Status"
                widget: "select"
                options: ["voting", "aktif", "selesai"]
              - name: "items"
                label: "Item-item"
                widget: "list"
                required: false
                summary: "{{fields.nama}}"
                fields:
                  - {name: "id", label: "ID", widget: "string"}
                  - {name: "nama", label: "Nama", widget: "string"}
                  - {name: "subjudul", label: "Subjudul", widget: "string"}
                  - {name: "deskripsi", label: "Deskripsi", widget: "text"}
                  - {name: "link", label: "Link", widget: "string"}

  - name: "seo"
    label: "SEO"
    files:
      - name: "seo"
        label: "Deskripsi & Kata Kunci"
        file: "konten/seo.json"
        fields:
          - name: "description"
            label: "Deskripsi Website"
            widget: "text"
            hint: "Teks singkat yang muncul di hasil pencarian Google (ideal 150-160 karakter)"
          - name: "keywords"
            label: "Kata Kunci Pencarian"
            widget: "string"
            hint: "Pisahkan dengan koma. Contoh: ilmu agama islam, manhaj salaf, tauhid"

  # ── CERAMAH ─────────────────────────────────────────────────
  - name: "ceramah-index-mgr"
    label: "🗂️ Ceramah — Daftar ID"
    files:
      - name: "ceramah-index"
        label: "Daftar ID Ceramah (urutan tampil)"
        file: "konten/ceramah-index.json"
        fields:
          - name: "ids"
            label: "ID Ceramah"
            widget: "list"
            hint: "Tambah ID baru di sini setiap kali menambah ceramah. Urutan di sini = urutan tampil."

  - name: "ceramah"
    label: "🎙️ Ceramah — Isi"
    folder: "konten/ceramah-items"
    create: true
    delete: true
    identifier_field: "id"
    summary: "{{fields.judul}}"
    extension: "json"
    format: "json"
    fields:
      - name: "id"
        label: "ID (contoh: c051)"
        widget: "string"
        hint: "ID unik, huruf kecil tanpa spasi, contoh: c051"

      - name: "judul"
        label: "Judul Ceramah"
        widget: "string"

      - name: "jenis"
        label: "Jenis"
        widget: "select"
        options:
          - {label: "Khutbah Jum'at", value: "khutbah-jumat"}
          - {label: "Kultum Subuh", value: "kultum-subuh"}
          - {label: "Kajian Biasa", value: "kajian-biasa"}
          - {label: "Ceramah Tarawih", value: "ceramah-tarawih"}

      - name: "jenis_label"
        label: "Label Jenis (tampil di kartu)"
        widget: "string"
        hint: "Contoh: Khutbah Jum'at"

      - name: "pembahasan"
        label: "Pembahasan"
        widget: "select"
        options:
          - {label: "Aqidah", value: "aqidah"}
          - {label: "Fiqih", value: "fiqih"}
          - {label: "Akhlak", value: "akhlak"}
          - {label: "Sedekah", value: "sedekah"}
          - {label: "Taubat", value: "taubat"}
          - {label: "Ramadhan", value: "ramadhan"}
          - {label: "Lainnya", value: "lainnya"}

      - name: "pembahasan_label"
        label: "Label Pembahasan (tampil di kartu)"
        widget: "string"
        hint: "Contoh: Aqidah"

      - name: "durasi"
        label: "Durasi"
        widget: "select"
        options:
          - {label: "±5 menit", value: "±5 menit"}
          - {label: "±7 menit", value: "±7 menit"}
          - {label: "±10 menit", value: "±10 menit"}
          - {label: "±15 menit", value: "±15 menit"}
          - {label: "±20 menit", value: "±20 menit"}
          - {label: "±25 menit", value: "±25 menit"}
          - {label: "±30 menit", value: "±30 menit"}

      - name: "ringkasan"
        label: "Ringkasan"
        widget: "text"
        hint: "Deskripsi singkat yang tampil di kartu pencarian"

      - name: "teks"
        label: "Isi Ceramah"
        widget: "list"
        summary: "{{fields.bagian}}"
        fields:
          - name: "bagian"
            label: "Judul Bagian"
            widget: "string"
            hint: "Contoh: Muqaddimah, Isi Pertama, Penutup"
          - name: "isi"
            label: "Isi Teks"
            widget: "text"
            hint: "Pisahkan paragraf dengan baris kosong"
