<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor Catatan</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <meta name="robots" content="noindex">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

    :root {
      --bg-dark:    #0b0c0e;
      --bg-card:    rgba(255,255,255,0.04);
      --bg-sidebar: #111318;
      --gold:       #ffd700;
      --green:      #00ff88;
      --text-light: #f2f2f2;
      --text-muted: rgba(242,242,242,0.55);
      --border:     rgba(0,255,136,0.18);
      --transition: 0.25s ease;
    }
    [data-theme="light"] {
      --bg-dark:    #f4f4f0;
      --bg-card:    rgba(0,0,0,0.04);
      --bg-sidebar: #ffffff;
      --gold:       #b8860b;
      --green:      #1a7a4a;
      --text-light: #1a1a1a;
      --text-muted: rgba(30,30,30,0.55);
      --border:     rgba(26,122,74,0.2);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      height: 100%;
      font-family: 'Poppins', sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      transition: background var(--transition), color var(--transition);
    }

    /* ─── LAYOUT ─────────────────────────── */
    .editor-wrap {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 760px;
      margin: 0 auto;
    }

    /* ─── HEADER ─────────────────────────── */
    .editor-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-dark);
      position: sticky;
      top: 0;
      z-index: 100;
      flex-shrink: 0;
    }

    .btn-back {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--green);
      padding: 6px 12px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.82rem;
      cursor: pointer;
      white-space: nowrap;
      transition: all var(--transition);
      flex-shrink: 0;
    }
    .btn-back:hover { border-color: var(--green); background: rgba(0,255,136,0.07); }

    .editor-judul-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-family: 'Poppins', sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--gold);
      width: 100%;
    }
    .editor-judul-input::placeholder { color: var(--text-muted); font-weight: 400; }

    .save-status {
      font-size: 0.73rem;
      color: var(--text-muted);
      white-space: nowrap;
      flex-shrink: 0;
      min-width: 80px;
      text-align: right;
    }
    .save-status.saved { color: var(--green); }

    /* ─── TOOLBAR ─────────────────────────── */
    .toolbar-wrap {
      background: var(--bg-sidebar);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 6px 10px;
      min-width: max-content;
    }

    .tool-btn {
      background: none;
      border: none;
      border-radius: 7px;
      color: var(--text-light);
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: 'Poppins', sans-serif;
      font-weight: 500;
      transition: all var(--transition);
      flex-shrink: 0;
    }
    .tool-btn:hover  { background: var(--bg-card); color: var(--gold); }
    .tool-btn.active { background: rgba(255,215,0,0.12); color: var(--gold); }
    .tool-btn svg    { width: 16px; height: 16px; fill: currentColor; }

    .tool-sep {
      width: 1px;
      height: 22px;
      background: var(--border);
      margin: 0 4px;
      flex-shrink: 0;
    }

    /* Color picker */
    .tool-color-wrap {
      position: relative;
      flex-shrink: 0;
    }
    .tool-color-btn {
      background: none;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      width: 34px;
      height: 34px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      transition: background var(--transition);
    }
    .tool-color-btn:hover { background: var(--bg-card); }
    .tool-color-btn span  { font-size: 0.85rem; color: var(--text-light); font-family: 'Poppins', sans-serif; font-weight: 700; }
    .tool-color-bar       { width: 18px; height: 3px; border-radius: 2px; background: var(--gold); }
    .tool-color-input     { position: absolute; width: 1px; height: 1px; opacity: 0; top: 0; left: 0; }

    /* Heading select */
    .tool-select {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text-light);
      font-family: 'Poppins', sans-serif;
      font-size: 0.78rem;
      padding: 4px 6px;
      cursor: pointer;
      height: 34px;
      flex-shrink: 0;
    }
    .tool-select option { background: #111318; }

    /* ─── EDITOR AREA ─────────────────────── */
    .editor-body {
      flex: 1;
      overflow-y: auto;
      padding: 18px 18px 80px;
    }

    #editorContent {
      min-height: 100%;
      outline: none;
      line-height: 1.75;
      font-size: 0.95rem;
      color: var(--text-light);
      word-break: break-word;
    }
    #editorContent:empty::before {
      content: attr(data-placeholder);
      color: var(--text-muted);
      pointer-events: none;
    }

    /* Konten dalam editor */
    #editorContent h1 { font-size: 1.6rem; color: var(--gold); margin: 10px 0 6px; }
    #editorContent h2 { font-size: 1.25rem; color: var(--gold); margin: 10px 0 6px; }
    #editorContent h3 { font-size: 1.05rem; color: var(--gold); margin: 8px 0 4px; }
    #editorContent p  { margin: 4px 0; }
    #editorContent ul, #editorContent ol { padding-left: 22px; margin: 4px 0; }
    #editorContent li { margin: 2px 0; }
    #editorContent strong { font-weight: 700; }
    #editorContent em     { font-style: italic; }
    #editorContent u      { text-decoration: underline; }
    #editorContent s      { text-decoration: line-through; }

    #editorContent blockquote {
      border-left: 3px solid var(--gold);
      padding: 8px 14px;
      margin: 10px 0;
      background: rgba(255,215,0,0.05);
      border-radius: 0 8px 8px 0;
      font-style: italic;
      color: var(--text-muted);
    }

    #editorContent hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 14px 0;
    }

    #editorContent a { color: var(--green); }

    /* ─── DELETE BTN ─────────────────────── */
    .btn-delete {
      background: none;
      border: 1px solid rgba(255,80,80,0.3);
      border-radius: 8px;
      color: rgba(255,80,80,0.7);
      padding: 6px 12px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all var(--transition);
      flex-shrink: 0;
    }
    .btn-delete:hover { border-color: #ff5050; color: #ff5050; background: rgba(255,80,80,0.07); }

    /* ─── DIALOG KONFIRMASI ──────────────── */
    .dialog-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 500;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(2px);
    }
    .dialog-overlay.show { display: flex; }
    .dialog-box {
      background: var(--bg-sidebar);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px 22px 20px;
      max-width: 300px;
      width: 90%;
      text-align: center;
    }
    .dialog-title { font-weight: 600; font-size: 1rem; margin-bottom: 8px; color: var(--text-light); }
    .dialog-desc  { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 20px; }
    .dialog-btns  { display: flex; gap: 10px; justify-content: center; }
    .dialog-btn-cancel {
      flex: 1; padding: 9px; border-radius: 8px;
      border: 1px solid var(--border); background: none;
      color: var(--text-light); font-family: 'Poppins', sans-serif; font-size: 0.85rem;
      cursor: pointer; transition: all var(--transition);
    }
    .dialog-btn-cancel:hover { border-color: var(--green); }
    .dialog-btn-delete {
      flex: 1; padding: 9px; border-radius: 8px;
      border: 1px solid rgba(255,80,80,0.4); background: rgba(255,80,80,0.1);
      color: #ff5050; font-family: 'Poppins', sans-serif; font-size: 0.85rem; font-weight: 600;
      cursor: pointer; transition: all var(--transition);
    }
    .dialog-btn-delete:hover { background: rgba(255,80,80,0.2); }
  </style>
</head>
<body>

<div class="editor-wrap">

  <!-- HEADER -->
  <div class="editor-header">
    <button class="btn-back" id="btnBack">← Kembali</button>
    <input class="editor-judul-input" id="editorJudul" type="text" placeholder="Judul catatan…" maxlength="100" autocomplete="off" spellcheck="false">
    <span class="save-status" id="saveStatus">—</span>
    <button class="btn-delete" id="btnDelete" title="Hapus catatan">🗑</button>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar-wrap">
    <div class="toolbar">

      <!-- Heading -->
      <select class="tool-select" id="selHeading" title="Format teks">
        <option value="">Paragraf</option>
        <option value="h1">Judul 1</option>
        <option value="h2">Judul 2</option>
        <option value="h3">Judul 3</option>
      </select>

      <div class="tool-sep"></div>

      <!-- Bold -->
      <button class="tool-btn" id="btnBold" title="Tebal (Ctrl+B)"><b>B</b></button>
      <!-- Italic -->
      <button class="tool-btn" id="btnItalic" title="Miring (Ctrl+I)"><i>I</i></button>
      <!-- Underline -->
      <button class="tool-btn" id="btnUnderline" title="Garis bawah (Ctrl+U)"><u>U</u></button>
      <!-- Strikethrough -->
      <button class="tool-btn" id="btnStrike" title="Coret"><s>S</s></button>

      <div class="tool-sep"></div>

      <!-- Warna teks -->
      <div class="tool-color-wrap" title="Warna teks">
        <button class="tool-color-btn" id="btnColor" title="Warna teks">
          <span>A</span>
          <div class="tool-color-bar" id="colorBar"></div>
        </button>
        <input class="tool-color-input" type="color" id="colorPicker" value="#ffd700">
      </div>

      <div class="tool-sep"></div>

      <!-- List -->
      <button class="tool-btn" id="btnUl" title="Daftar tidak berurut">
        <svg viewBox="0 0 24 24"><path d="M3 6h2v2H3zm4 0h14v2H7zm-4 5h2v2H3zm4 0h14v2H7zm-4 5h2v2H3zm4 0h14v2H7z"/></svg>
      </button>
      <button class="tool-btn" id="btnOl" title="Daftar berurut">
        <svg viewBox="0 0 24 24"><path d="M2 17h2v.5H3v1h1v.5H2v1h3v-4H2zm1-9h1V4H2v1h1zm-1 3h1.8L2 13.1v.9h3v-1H3.2L5 10.9V10H2zm5-6v2h14V5zm0 14h14v-2H7zm0-6h14v-2H7z"/></svg>
      </button>

      <!-- Kutipan -->
      <button class="tool-btn" id="btnQuote" title="Kutipan">
        <svg viewBox="0 0 24 24"><path d="M6 17h3l2-4V7H5v6h3zm8 0h3l2-4V7h-6v6h3z"/></svg>
      </button>

      <div class="tool-sep"></div>

      <!-- Garis pemisah -->
      <button class="tool-btn" id="btnHr" title="Garis pemisah">—</button>

      <!-- Undo / Redo -->
      <button class="tool-btn" id="btnUndo" title="Urungkan (Ctrl+Z)">
        <svg viewBox="0 0 24 24"><path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/></svg>
      </button>
      <button class="tool-btn" id="btnRedo" title="Ulangi (Ctrl+Y)">
        <svg viewBox="0 0 24 24"><path d="M18.4 10.6C16.55 8.99 14.15 8 11.5 8c-4.65 0-8.58 3.03-9.96 7.22L3.9 16c1.05-3.19 4.05-5.5 7.6-5.5 1.95 0 3.73.72 5.12 1.88L13 16h9V7l-3.6 3.6z"/></svg>
      </button>
    </div>
  </div>

  <!-- AREA EDITOR -->
  <div class="editor-body">
    <div id="editorContent"
         contenteditable="true"
         data-placeholder="Mulai menulis catatan…"
         spellcheck="false"></div>
  </div>

</div>

<!-- DIALOG HAPUS -->
<div class="dialog-overlay" id="dialogHapus">
  <div class="dialog-box">
    <div class="dialog-title">Hapus Catatan?</div>
    <div class="dialog-desc">Catatan ini akan dihapus permanen dan tidak bisa dikembalikan.</div>
    <div class="dialog-btns">
      <button class="dialog-btn-cancel" id="dialogCancel">Batal</button>
      <button class="dialog-btn-delete" id="dialogConfirm">Hapus</button>
    </div>
  </div>
</div>

<script>
(function() {
  // ── INIT TEMA ────────────────────────────
  try {
    var t = localStorage.getItem('iai_theme');
    if (t) document.documentElement.setAttribute('data-theme', t);
  } catch(e) {}

  // ── AMBIL ID CATATAN DARI URL ────────────
  var params  = new URLSearchParams(window.location.search);
  var noteId  = params.get('id');
  var NOTES_KEY = 'iai_catatan';

  function getNotes() {
    try { return JSON.parse(localStorage.getItem(NOTES_KEY)) || []; } catch(e) { return []; }
  }

  function saveNotes(arr) {
    try { localStorage.setItem(NOTES_KEY, JSON.stringify(arr)); } catch(e) {}
  }

  function getNote() {
    return getNotes().find(function(n) { return n.id === noteId; }) || null;
  }

  // ── LOAD NOTE ───────────────────────────
  var judulEl   = document.getElementById('editorJudul');
  var contentEl = document.getElementById('editorContent');
  var statusEl  = document.getElementById('saveStatus');

  var note = getNote();
  if (!note) {
    // ID tidak valid, balik ke index
    goBack();
  } else {
    judulEl.value       = note.judul || '';
    contentEl.innerHTML = note.isi   || '';
    document.title      = (note.judul || 'Catatan') + ' — Ilmu Agama Islam';
  }

  // ── AUTO SAVE ────────────────────────────
  var saveTimer;
  function schedSave() {
    statusEl.textContent = 'Menyimpan…';
    statusEl.className   = 'save-status';
    clearTimeout(saveTimer);
    saveTimer = setTimeout(doSave, 900);
  }

  function doSave() {
    var notes = getNotes();
    var idx   = notes.findIndex(function(n) { return n.id === noteId; });
    if (idx === -1) return;
    notes[idx].judul  = judulEl.value.trim();
    notes[idx].isi    = contentEl.innerHTML;
    notes[idx].diubah = Date.now();
    saveNotes(notes);
    document.title    = (notes[idx].judul || 'Catatan') + ' — Ilmu Agama Islam';
    statusEl.textContent = '✓ Tersimpan';
    statusEl.className   = 'save-status saved';
    setTimeout(function() {
      statusEl.textContent = '—';
      statusEl.className   = 'save-status';
    }, 2500);
  }

  judulEl.addEventListener('input', schedSave);
  contentEl.addEventListener('input', schedSave);

  // ── KEMBALI ──────────────────────────────
  function goBack() {
    doSave();
    try { localStorage.setItem('iai_return_tab', 'catatan'); } catch(e) {}
    window.location.href = '../index.html';
  }
  document.getElementById('btnBack').addEventListener('click', goBack);

  // ── HAPUS ────────────────────────────────
  var dialog = document.getElementById('dialogHapus');
  document.getElementById('btnDelete').addEventListener('click', function() {
    dialog.classList.add('show');
  });
  document.getElementById('dialogCancel').addEventListener('click', function() {
    dialog.classList.remove('show');
  });
  document.getElementById('dialogConfirm').addEventListener('click', function() {
    var notes = getNotes().filter(function(n) { return n.id !== noteId; });
    saveNotes(notes);
    try { localStorage.setItem('iai_return_tab', 'catatan'); } catch(e) {}
    window.location.href = '../index.html';
  });

  // ── TOOLBAR ──────────────────────────────
  function cmd(command, val) {
    contentEl.focus();
    document.execCommand(command, false, val || null);
    updateToolbarState();
  }

  function updateToolbarState() {
    ['Bold','Italic','Underline','Strikethrough'].forEach(function(c) {
      var id = 'btn' + (c === 'Strikethrough' ? 'Strike' : c);
      var el = document.getElementById(id);
      if (el) el.classList.toggle('active', document.queryCommandState(c));
    });
    // Heading select
    var block = document.queryCommandValue('formatBlock').toLowerCase();
    var sel   = document.getElementById('selHeading');
    if (sel) {
      if      (block === 'h1') sel.value = 'h1';
      else if (block === 'h2') sel.value = 'h2';
      else if (block === 'h3') sel.value = 'h3';
      else                     sel.value = '';
    }
  }

  document.getElementById('btnBold')      .addEventListener('click', function() { cmd('bold'); });
  document.getElementById('btnItalic')    .addEventListener('click', function() { cmd('italic'); });
  document.getElementById('btnUnderline') .addEventListener('click', function() { cmd('underline'); });
  document.getElementById('btnStrike')    .addEventListener('click', function() { cmd('strikeThrough'); });
  document.getElementById('btnUl')        .addEventListener('click', function() { cmd('insertUnorderedList'); });
  document.getElementById('btnOl')        .addEventListener('click', function() { cmd('insertOrderedList'); });
  document.getElementById('btnUndo')      .addEventListener('click', function() { cmd('undo'); });
  document.getElementById('btnRedo')      .addEventListener('click', function() { cmd('redo'); });

  document.getElementById('btnQuote').addEventListener('click', function() {
    cmd('formatBlock', 'blockquote');
  });

  document.getElementById('btnHr').addEventListener('click', function() {
    cmd('insertHorizontalRule');
  });

  // Heading
  document.getElementById('selHeading').addEventListener('change', function() {
    cmd('formatBlock', this.value || 'p');
  });

  // Warna teks
  var colorPicker = document.getElementById('colorPicker');
  var colorBar    = document.getElementById('colorBar');
  document.getElementById('btnColor').addEventListener('click', function() {
    colorPicker.click();
  });
  colorPicker.addEventListener('input', function() {
    colorBar.style.background = this.value;
    cmd('foreColor', this.value);
  });

  contentEl.addEventListener('keyup',    updateToolbarState);
  contentEl.addEventListener('mouseup',  updateToolbarState);
  contentEl.addEventListener('touchend', updateToolbarState);

  // Focus ke editor saat halaman dimuat
  contentEl.focus();
  // Pindah cursor ke akhir
  if (contentEl.innerHTML) {
    var range = document.createRange();
    range.selectNodeContents(contentEl);
    range.collapse(false);
    var sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  }
})();
</script>
</body>
</html>
